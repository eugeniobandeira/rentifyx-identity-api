apiVersion: apps/v1
kind: Deployment
metadata:
  name: rentifyx-identity-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: rentifyx-identity-api
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            # Secrets are provided via LocalStack / local appsettings in dev.
            # Replace with actual values when running against a local AWS stack.
            - name: Jwt__PrivateKeyPem
              value: ""
            - name: Hmac__Key
              value: ""
            - name: Ses__FromAddress
              value: ""
