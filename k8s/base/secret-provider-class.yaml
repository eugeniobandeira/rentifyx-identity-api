apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: api-secrets
spec:
  provider: aws
  parameters:
    # Secret names follow the pattern <prefix>/<secret-name> produced by the Terraform secrets module.
    # Replace ACCOUNT_ID and PREFIX with values from `terraform output`.
    objects: |
      - objectName: "rentifyx-identity-production/jwt-private-key-pem"
        objectType: "secretsmanager"
        objectAlias: "jwt-private-key-pem"
      - objectName: "rentifyx-identity-production/hmac-key"
        objectType: "secretsmanager"
        objectAlias: "hmac-key"
      - objectName: "rentifyx-identity-production/ses-from-address"
        objectType: "secretsmanager"
        objectAlias: "ses-from-address"
  secretObjects:
    - secretName: api-secrets
      type: Opaque
      data:
        - objectName: jwt-private-key-pem
          key: jwt-private-key-pem
        - objectName: hmac-key
          key: hmac-key
        - objectName: ses-from-address
          key: ses-from-address
