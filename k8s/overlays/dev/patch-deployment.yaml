apiVersion: apps/v1
kind: Deployment
metadata:
  name: rentifyx-identity-api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: rentifyx-identity-api
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            # Secrets are loaded from real AWS Secrets Manager (rentifyx/identity/development).
            # Replace with actual values only if bypassing Secrets Manager for debugging.
            - name: Jwt__PrivateKeyPem
              value: ""
            - name: Hmac__Key
              value: ""
            - name: Ses__FromAddress
              value: ""
