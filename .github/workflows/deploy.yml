# KNOWN GAP (2026-07-20): SSM Agent never registered on this AMI in
# testing this session (aws ssm describe-instance-information stayed
# empty 20+ minutes; IAM/network/DHCP all confirmed correct). If this
# workflow's "Deploy to EC2 via SSM" step hangs/fails with
# InvalidInstanceId, that's the same unresolved gap, not this workflow's
# logic - see rentifyx-identity-api STATE.md for the full investigation.
name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time; cancel any queued run if a newer one arrives
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  id-token: write  # required for OIDC token
  contents: read

env:
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: 166613156216.dkr.ecr.sa-east-1.amazonaws.com/rentifyx-production-identity-api
  KAFKA_SSM_PARAMETER: /rentifyx/platform/kafka/bootstrap-servers

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve EC2 instance ID
        # Never hardcode this - the instance gets replaced by lifecycle
        # events (AMI updates via a deliberate apply, VPC migrations, etc.)
        # and a stale ID here means every step below silently targets a
        # dead instance. Found and fixed 2026-07-20 after exactly that.
        run: |
          EC2_INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=rentifyx-production-identity-api" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ "$EC2_INSTANCE_ID" = "None" ] || [ -z "$EC2_INSTANCE_ID" ]; then
            echo "::error::No running EC2 instance found with tag Name=rentifyx-production-identity-api"
            exit 1
          fi

          echo "EC2_INSTANCE_ID=$EC2_INSTANCE_ID" >> "$GITHUB_ENV"
          echo "Resolved instance: $EC2_INSTANCE_ID"

      - name: Resolve Kafka bootstrap servers
        run: |
          BOOTSTRAP_SERVERS=$(aws ssm get-parameter \
            --name "$KAFKA_SSM_PARAMETER" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)
          echo "KAFKA_BOOTSTRAP_SERVERS=$BOOTSTRAP_SERVERS" >> "$GITHUB_ENV"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REPOSITORY:latest .
          docker push $ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REPOSITORY:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY\",
              \"docker pull $ECR_REPOSITORY:$IMAGE_TAG\",
              \"docker rm -f rentifyx-identity-api 2>/dev/null || true\",
              \"docker run -d --name rentifyx-identity-api --restart unless-stopped -p 8080:8080 -e ASPNETCORE_ENVIRONMENT=Production -e AWS__Region=$AWS_REGION -e AWS__DynamoDB__TableName=rentifyx-production-identity -e ConnectionStrings__kafka=$KAFKA_BOOTSTRAP_SERVERS $ECR_REPOSITORY:$IMAGE_TAG\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll until the command completes (max 3 min)
          for i in $(seq 1 18); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "  [$i/18] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "Deploy timed out waiting for SSM command."
          exit 1

      - name: Fetch container startup logs
        if: always()
        run: |
          sleep 8
          LOG_CMD=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["docker logs rentifyx-identity-api --tail 80 2>&1 || echo container-not-found"]' \
            --query "Command.CommandId" \
            --output text)
          sleep 6
          aws ssm get-command-invocation \
            --command-id "$LOG_CMD" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text
