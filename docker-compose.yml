services:
  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: dynamodb,ses,secretsmanager,kms
      AWS_DEFAULT_REGION: sa-east-1
      LOCALSTACK_HOST: localstack
    volumes:
      - ./01-aspire/01-AppHost/scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-aws.sh
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      LocalStack__UseLocalStack: "true"
      LocalStack__Config__LocalStackHost: localstack
      LocalStack__Config__EdgePort: "4566"
      LocalStack__Config__UseSsl: "false"
      AWS__Region: sa-east-1
      AWS__DynamoDB__TableName: rentifyx-identity
      AWS__SecretsManager__SecretName: rentifyx/identity/development
    depends_on:
      localstack:
        condition: service_healthy
