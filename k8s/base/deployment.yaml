apiVersion: apps/v1
kind: Deployment
metadata:
  name: rentifyx-identity-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rentifyx-identity-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rentifyx-identity-api
    spec:
      containers:
        - name: rentifyx-identity-api
          image: rentifyx-identity-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: rentifyx-identity-api-config
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
