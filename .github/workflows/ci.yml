name: CI

on:
  pull_request:
    branches: [main]  # only PRs targeting main; direct pushes are blocked by branch protection

# Cancel in-progress runs for the same PR when new commits are pushed
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can diff the entire branch

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --config .gitleaks.toml --redact --verbose

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: secret-scan  # blocks if secrets are found

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore RentifyxIdentity.slnx

      - name: Build
        run: dotnet build RentifyxIdentity.slnx --no-restore --configuration Release

      - name: Test with coverage
        run: >
          dotnet test RentifyxIdentity.slnx
          --no-build
          --configuration Release
          --verbosity normal
          --settings coverlet.runsettings
          --collect:"XPlat Code Coverage"
          --results-directory coverage

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Merge coverage reports
        run: >
          reportgenerator
          "-reports:coverage/**/coverage.cobertura.xml"
          "-targetdir:coverage/report"
          "-reporttypes:TextSummary"

      - name: Enforce coverage gate (line >= 80%)
        run: |
          LINE=$(grep "Line coverage" coverage/report/Summary.txt | grep -oP '\d+(\.\d+)?(?=%)')
          echo "Line coverage: ${LINE}%"
          if awk "BEGIN {exit !($LINE >= 80)}"; then
            echo "Coverage gate passed: ${LINE}% >= 80%"
          else
            echo "Coverage gate FAILED: ${LINE}% < 80%"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/report/Summary.txt
          retention-days: 30

  owasp-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check/data
          key: ${{ runner.os }}-owasp-nvd-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-owasp-nvd-

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'rentifyx-identity-api'
          path: '.'
          format: 'HTML'
          out: 'reports/owasp'
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: reports/owasp/dependency-check-report.html
          retention-days: 30

  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rentifyx-identity-api:ci .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'rentifyx-identity-api:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
