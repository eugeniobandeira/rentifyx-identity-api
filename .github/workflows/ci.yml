name: CI

on:
  pull_request:
    branches: [main]  # only PRs targeting main; direct pushes are blocked by branch protection

# Cancel in-progress runs for the same PR when new commits are pushed
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can diff the entire branch

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --config .gitleaks.toml --redact --verbose

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: secret-scan  # blocks if secrets are found

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore RentifyxIdentity.slnx

      - name: Build
        run: dotnet build RentifyxIdentity.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test RentifyxIdentity.slnx --no-build --configuration Release --verbosity normal
