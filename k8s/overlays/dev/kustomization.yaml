apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: dev

patches:
  - path: patch-deployment.yaml
    target:
      kind: Deployment
      name: rentifyx-identity-api
  - path: patch-configmap.yaml
    target:
      kind: ConfigMap
      name: rentifyx-identity-api-config
